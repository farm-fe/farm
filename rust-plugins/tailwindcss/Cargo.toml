[package]
edition = "2024"
name = "farmfe_plugin_tailwindcss"
version = "0.0.1"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
farmfe_core = { version = "*", path = "../../crates/core" }
farmfe_macro_plugin = { version = "*", path = "../../crates/macro_plugin" }
farmfe_toolkit = { path = "../../crates/toolkit" }
farmfe_utils = { path = "../../crates/utils" }
farmfe_ecosystem_tailwindcss = { path = "../../rust-ecosystem/tailwindcss" }
farmfe_ecosystem_tailwindcss_node = { path = "../../rust-ecosystem/tailwindcss-node" }
tailwindcss-oxide = { git = "https://github.com/tailwindlabs/tailwindcss", package = "tailwindcss-oxide", tag = "v4.1.12" }
serde = { version = "1.0", features = ["derive"] }

[dev-dependencies]
farmfe_testing_helpers = { path = "../../crates/testing_helpers" }
farmfe_compiler = { path = "../../crates/compiler" }
