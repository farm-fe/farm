[package]
edition = "2021"
name = "farm_plugin_svgr"
version = "2.0.0"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
farmfe_core = { version = "2.0.0", path = "../../crates/core" }
farmfe_utils = { version = "2.0.0", path = "../../crates/utils" }
farmfe_toolkit_plugin_types = { version = "2.0.0", path = "../../crates/toolkit_plugin_types" }
farmfe_macro_plugin = { version = "2.0.0", path = "../../crates/macro_plugin" }
farmfe_toolkit = { version = "2.0.0", path = "../../crates/toolkit" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
svgr-rs = "0.2.0"
globset = "0.4"
xmltree = "0.11.0"
