[package]
edition = "2021"
name = "farmfe_plugin_icons"
version = "2.0.0"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
farmfe_core = { version = "2.0.0", path = "../../crates/core" }
farmfe_toolkit_plugin_types = { version = "2.0.0", path = "../../crates/toolkit_plugin_types" }
farmfe_macro_plugin = { version = "2.0.0", path = "../../crates/macro_plugin" }
farmfe_toolkit = { version = "2.0.0", path = "../../crates/toolkit" }
farmfe_utils = { version = "2.0.0", path = "../../crates/utils" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
svgr-rs = "0.2.0"
once_cell = "1.19.0"
fervid = "0.2.0"
# reqwest = "0.12.5"
tokio = { version = "1.38.0", features = ["full"] }
walkdir = "2.5.0"
xmltree = "0.11.0"
reqwest = { version = "0.12.9", features = [
  "rustls-tls",
], default-features = false }
bincode = "2.0.1"
loading = "0.4.0"
