[package]
edition = "2021"
name = "farmfe_plugin_sass"
version = "2.0.0"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
farmfe_core = { version = "2.0.0", path = "../../crates/core" }
farmfe_macro_plugin = { version = "2.0.0", path = "../../crates/macro_plugin" }
farmfe_toolkit = { path = "../../crates/toolkit" }
farmfe_utils = { path = "../../crates/utils" }
grass = { version = "0.13.4", default-features = false, features = ["random"] }
serde = { version = "1.0", features = ["derive"] }

[dev-dependencies]
farmfe_testing_helpers = { path = "../../crates/testing_helpers" }
farmfe_compiler = { path = "../../crates/compiler" }
