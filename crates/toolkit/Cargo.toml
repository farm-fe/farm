[package]
name = "farmfe_toolkit"
version = "2.1.0"
edition = "2021"
authors = ["brightwu(吴明亮) <1521488775@qq.com>"]
license = "MIT"
description = "Toolkit for farm."
homepage = "https://farmfe.org"
repository = "https://github.com/farm-fe/farm"
documentation = "https://docs.rs/farmfe_toolkit"

[features]
# full = [
#   "swc_ecma_parser",
#   "swc_ecma_visit",
#   "swc_ecma_codegen",
#   "swc_ecma_transforms",
# ]

[dependencies]
farmfe_core = { path = "../core", version = "2.1.0" }
farmfe_utils = { path = "../utils", version = "2.1.0" }
farmfe_testing_helpers = { path = "../testing_helpers", version = "2.0.1" }
swc_ecma_parser = { workspace = true }
swc_ecma_visit = { workspace = true }
swc_ecma_codegen = { workspace = true }
swc_typescript = { workspace = true }
swc_ecma_transforms = { workspace = true, features = [
  "module",
  "typescript",
  "react",
  "concurrent",
] }
swc_ecma_preset_env = { workspace = true }
preset_env_base = { version = "7.0.0" }
swc_css_parser = { workspace = true }
swc_css_visit = { workspace = true }
swc_css_codegen = { workspace = true }
swc_css_minifier = { workspace = true }
swc_css_modules = { workspace = true }
swc_css_prefixer = { workspace = true }
swc_html_parser = { workspace = true }
swc_html_visit = { workspace = true }
swc_html_codegen = { workspace = true }
swc_html_minifier = { workspace = true }
swc_error_reporters = { workspace = true }
swc_atoms = { workspace = true }
swc_ecma_transforms_base = { workspace = true, features = [
  "concurrent",
  "inline-helpers",
] }
swc_ecma_minifier = { workspace = true, features = ["concurrent"] }
swc_ecma_utils = { workspace = true, features = ["concurrent"] }
swc_sourcemap = { workspace = true }
anyhow = { version = "1.0.90", features = ["backtrace"] }
itertools = "0.14.0"
par-core = { version = "2.0.0", features = ["chili"] }
bytes-str = { workspace = true }
